```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing Automator - Multi-Engine Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #1e291b; 
            color: #d1d5db; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1.5rem; 
        }
        .inner-panel {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
        }
        .btn-blue {
            background: #007aff;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.3);
            transition: all 0.2s ease-in-out;
        }
        .btn-disabled {
            background: #2d332b;
            color: #4b5563;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .status-box {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 140px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-red { background: #dc2626; box-shadow: 0 0 8px #dc2626; }
        .dot-green { background: #10b981; box-shadow: 0 0 8px #10b981; }

        @keyframes blink { 50% { opacity: 0; } }
        .cursor { border-right: 2px solid #007aff; animation: blink 0.8s infinite; }

        input[type=range] { -webkit-appearance: none; background: #2d3d2a; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #007aff; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="p-6 md:p-12">

    <!-- Auth Lock Screen -->
    <div id="lockScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#1e291b]">
        <div class="glass p-10 w-full max-w-sm text-center border-t-4 border-emerald-500">
            <h2 class="text-2xl font-bold text-white mb-6 tracking-tight">System Entry</h2>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••" 
                class="w-full text-center text-4xl font-mono bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-emerald-500 text-white tracking-[0.4em]">
            <p class="mt-4 text-[10px] text-emerald-500/40 uppercase tracking-widest font-bold">Pin Required: 1045</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="platform" class="hidden max-w-5xl mx-auto space-y-6">
        
        <!-- Top Status Bar -->
        <div class="flex flex-col md:flex-row justify-between items-start gap-4">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight uppercase">Bing Automator</h1>
                <p class="text-xs text-emerald-500/60 uppercase font-bold tracking-widest">Protocol: Hybrid Detection Mode</p>
            </div>
            
            <div class="flex gap-4">
                <!-- Safari Status -->
                <div class="status-box">
                    <div id="safariDot" class="dot dot-red"></div>
                    <div class="flex flex-col">
                        <span class="text-[8px] text-slate-500 font-bold uppercase">Safari</span>
                        <span id="safariText" class="text-[10px] font-black text-red-600 uppercase">Offline</span>
                    </div>
                </div>
                <!-- Edge Status -->
                <div class="status-box">
                    <div id="edgeDot" class="dot dot-red"></div>
                    <div class="flex flex-col">
                        <span class="text-[8px] text-slate-500 font-bold uppercase">Edge</span>
                        <span id="edgeText" class="text-[10px] font-black text-red-600 uppercase">Offline</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Left Side: Controls -->
            <div class="space-y-6">
                <div class="glass p-8 space-y-8">
                    <!-- Speed -->
                    <div>
                        <div class="flex justify-between mb-4">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Automation Speed</label>
                            <span id="speedVal" class="text-blue-400 font-bold text-[10px]">75%</span>
                        </div>
                        <input type="range" id="speedSlider" min="1" max="100" value="75" class="w-full">
                    </div>

                    <!-- Search Limit -->
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3">Amount of Types</label>
                        <div class="inner-panel p-6 flex items-center justify-between border-emerald-500/10">
                            <span class="text-slate-400 font-bold text-[10px] uppercase">Target Amount</span>
                            <input type="number" id="searchLimit" value="30" 
                                class="bg-transparent text-5xl font-black text-white text-right outline-none w-24">
                        </div>
                    </div>
                </div>

                <button id="mainBtn" class="btn-disabled w-full py-5 rounded-2xl font-black text-xl tracking-widest uppercase transition-all duration-300" disabled>
                    Detecting Browser...
                </button>
            </div>

            <!-- Right Side: Live Terminal -->
            <div class="space-y-6">
                <div class="glass p-8 space-y-6 border-l-2 border-emerald-500/20">
                    <label class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest block">Live Auto-Typer</label>
                    <div class="inner-panel p-6 font-mono text-xl h-20 flex items-center overflow-hidden">
                        <span class="text-blue-500 mr-3 font-black">></span>
                        <span id="typerOutput" class="text-white"></span><span class="cursor"></span>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/5">
                        <div class="space-y-1">
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Progress</p>
                            <p id="progressLabel" class="text-3xl font-black text-white">0 / 30</p>
                        </div>
                        <div class="text-right space-y-1">
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Status</p>
                            <p id="timerDisplay" class="text-xl font-bold text-emerald-400">READY</p>
                        </div>
                    </div>

                    <div class="h-1 bg-black/40 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-emerald-500 w-0 transition-all duration-300"></div>
                    </div>
                </div>
                
                <div id="browserWarning" class="p-4 bg-red-500/5 rounded-xl border border-red-500/10 text-[10px] text-red-400 text-center hidden uppercase font-bold tracking-widest">
                    Incompatible Browser Detected
                </div>
            </div>
        </div>
    </div>

    <script>
        const words = ["Quantum", "Encryption", "Architecture", "Dynamics", "Velocity", "Synthesis", "Database", "Metadata", "Interface", "Algorithm", "Protocol", "Framework"];
        
        let isRunning = false;
        let count = 0;
        let automationWindow = null;
        let activeEngine = null; // 'safari' or 'edge'

        const pinInput = document.getElementById('pinInput');
        const lockScreen = document.getElementById('lockScreen');
        const platform = document.getElementById('platform');
        const mainBtn = document.getElementById('mainBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        const searchLimit = document.getElementById('searchLimit');
        const progressLabel = document.getElementById('progressLabel');
        const progressBar = document.getElementById('progressBar');
        const timerDisplay = document.getElementById('timerDisplay');
        const typerOutput = document.getElementById('typerOutput');

        function detectBrowser() {
            const userAgent = navigator.userAgent;
            const vendor = navigator.vendor;

            const isEdge = userAgent.includes("Edg/");
            const isSafari = vendor.includes("Apple") && userAgent.includes("Safari") && !userAgent.includes("Chrome") && !userAgent.includes("Chromium");

            const sDot = document.getElementById('safariDot');
            const sText = document.getElementById('safariText');
            const eDot = document.getElementById('edgeDot');
            const eText = document.getElementById('edgeText');

            if (isSafari) {
                activeEngine = 'safari';
                sDot.className = "dot dot-green";
                sText.innerText = "Connected";
                sText.className = "text-[10px] font-black text-emerald-500 uppercase";
                
                eDot.className = "dot dot-red";
                eText.innerText = "Blocked";
                
                unlockButton("Safari Engine Active");
            } else if (isEdge) {
                activeEngine = 'edge';
                eDot.className = "dot dot-green";
                eText.innerText = "Connected";
                eText.className = "text-[10px] font-black text-emerald-500 uppercase";
                
                sDot.className = "dot dot-red";
                sText.innerText = "Blocked";
                
                unlockButton("Edge Engine Active");
            } else {
                activeEngine = null;
                document.getElementById('browserWarning').classList.remove('hidden');
                mainBtn.innerText = "Incompatible Browser";
            }
        }

        function unlockButton(msg) {
            mainBtn.disabled = false;
            mainBtn.innerText = msg;
            mainBtn.classList.replace('btn-disabled', 'btn-blue');
        }

        pinInput.addEventListener('input', (e) => {
            if (e.target.value === '1045') {
                lockScreen.style.display = 'none';
                platform.classList.remove('hidden');
                detectBrowser();
            }
        });

        speedSlider.oninput = () => { speedVal.innerText = speedSlider.value + "%"; };
        searchLimit.oninput = () => { progressLabel.innerText = `${count} / ${searchLimit.value}`; };

        mainBtn.onclick = () => {
            if (isRunning) stopAutomation();
            else startAutomation();
        };

        function startAutomation() {
            automationWindow = window.open('https://www.bing.com', 'BingAuto', 'width=800,height=600');
            if (!automationWindow) {
                alert("Please allow popups for automation to work.");
                return;
            }
            isRunning = true;
            count = 0;
            mainBtn.innerText = "Stop " + activeEngine.toUpperCase();
            mainBtn.classList.replace('btn-blue', 'bg-red-500');
            runLoop();
        }

        function stopAutomation() {
            isRunning = false;
            mainBtn.innerText = (activeEngine ? activeEngine.toUpperCase() : "Engine") + " Active";
            mainBtn.classList.replace('bg-red-500', 'btn-blue');
            timerDisplay.innerText = "IDLE";
            if (automationWindow) automationWindow.close();
        }

        async function runLoop() {
            const limit = parseInt(searchLimit.value);
            if (!isRunning || count >= limit) {
                if(count >= limit) stopAutomation();
                return;
            }

            const speed = (101 - speedSlider.value) / 100;
            typerOutput.innerText = "";
            timerDisplay.innerText = "TYPING...";

            const query = words[Math.floor(Math.random() * words.length)] + " " + 
                          words[Math.floor(Math.random() * words.length)] + " " + 
                          Math.floor(Math.random() * 999);

            const charDelay = (1000 * speed) / query.length;
            for (let char of query) {
                if (!isRunning) return;
                typerOutput.innerText += char;
                await new Promise(r => setTimeout(r, charDelay));
            }

            if (automationWindow && !automationWindow.closed) {
                automationWindow.location.href = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
            } else {
                stopAutomation();
                return;
            }

            count++;
            progressLabel.innerText = `${count} / ${limit}`;
            
            const waitTime = (6000 * speed) + 2000;
            let elapsed = 0;
            while(elapsed < waitTime) {
                if (!isRunning) return;
                elapsed += 100;
                timerDisplay.innerText = `${Math.ceil((waitTime - elapsed)/1000)}s`;
                progressBar.style.width = (elapsed / waitTime * 100) + "%";
                await new Promise(r => setTimeout(r, 100));
            }
            runLoop();
        }
    </script>
</body>
</html>
